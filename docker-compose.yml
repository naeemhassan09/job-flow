services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: careeros
      POSTGRES_PASSWORD: careeros
      POSTGRES_DB: careeros
    ports:
      - "5432:5432"
    volumes:
      - careeros_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careeros -d careeros"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://careeros:careeros@postgres:5432/careeros
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  careeros_pg:
