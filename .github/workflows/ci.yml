name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check app evals tests

      - name: Ruff (format check)
        run: ruff format --check app evals tests

      - name: Mypy (strict on app + evals)
        run: mypy app evals

      - name: Pytest
        run: pytest --cov=app --cov-report=term-missing

  scope-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid legacy/ shipping in app paths
        run: |
          if grep -rq "from legacy" app/ evals/ 2>/dev/null; then
            echo "Imports from legacy/ are not allowed in app/ or evals/."
            exit 1
          fi
