<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CareerOS AI — Options</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>CareerOS AI — Options</h1>
      <p class="muted">Configure the backend you want captures sent to.</p>
    </header>

    <main>
      <section class="settings">
        <label>
          Backend URL
          <input id="backendUrl" type="url" placeholder="http://127.0.0.1:8000" />
        </label>
        <label>
          Bearer token (matches <code>EXTENSION_API_TOKEN</code>)
          <input id="token" type="password" autocomplete="off" />
        </label>
        <button id="save" class="primary">Save</button>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </section>

      <section class="settings">
        <p class="muted">
          The extension never reads pages in the background. JD text is only
          extracted when you click <em>Send JD to CareerOS</em> on a tab you are
          viewing. It only acts on
          <code>linkedin.com/jobs/*</code> and
          <code>indeed.com/viewjob*</code>.
        </p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
